db {
    default {
        driver="org.sqlite.JDBC"
        url="jdbc:sqlite:/db/db.sqlite3"
        user=""
        password=""
        poolInitialSize=1
        poolMaxSize=1
    }
}

scalikejdbc {
    global {
        loggingConnections = false
        loggingSQLAndTime {
            enabled = false
            singleLineMode = true
            logLevel = "DEBUG"
            warningEnabled = true
            warningThresholdMillis = 3000
            warningLogLevel = "WARN"
        }
    }
}
